<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DIYinventory — Electronics parts manager</title>
  <style>
/* DIYinventory — global styles */
@import url("https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap");

:root {
  /* light theme */
  --bg: oklch(0.992 0.003 90);
  --bg-sunk: oklch(0.97 0.004 90);
  --surface: oklch(1 0 0);
  --surface-2: oklch(0.985 0.003 90);
  --border: oklch(0.91 0.004 90);
  --border-strong: oklch(0.85 0.005 90);
  --text: oklch(0.21 0.008 260);
  --text-muted: oklch(0.5 0.01 260);
  --text-faint: oklch(0.65 0.008 260);
  --accent: oklch(0.74 0.16 70);
  --accent-soft: oklch(0.94 0.05 75);
  --accent-strong: oklch(0.66 0.17 60);
  --accent-fg: oklch(0.22 0.05 60);
  --danger: oklch(0.6 0.19 25);
  --danger-soft: oklch(0.95 0.04 25);
  --success: oklch(0.62 0.13 155);
  --success-soft: oklch(0.94 0.04 155);
  --info: oklch(0.62 0.12 240);
  --info-soft: oklch(0.95 0.03 240);
  --shadow-sm: 0 1px 0 oklch(0.85 0.005 90 / 0.6);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 260 / 0.06), 0 1px 2px oklch(0.2 0.01 260 / 0.04);
  --shadow-lg: 0 16px 40px oklch(0.2 0.01 260 / 0.12), 0 4px 12px oklch(0.2 0.01 260 / 0.06);
  --radius: 6px;
  --radius-lg: 10px;
}

[data-theme="dark"] {
  --bg: oklch(0.165 0.008 260);
  --bg-sunk: oklch(0.135 0.008 260);
  --surface: oklch(0.2 0.008 260);
  --surface-2: oklch(0.225 0.008 260);
  --border: oklch(0.28 0.008 260);
  --border-strong: oklch(0.35 0.008 260);
  --text: oklch(0.96 0.003 90);
  --text-muted: oklch(0.68 0.008 260);
  --text-faint: oklch(0.5 0.008 260);
  --accent: oklch(0.78 0.16 75);
  --accent-soft: oklch(0.3 0.06 70);
  --accent-strong: oklch(0.85 0.17 75);
  --accent-fg: oklch(0.16 0.008 260);
  --danger: oklch(0.7 0.18 25);
  --danger-soft: oklch(0.3 0.08 25);
  --success: oklch(0.72 0.13 155);
  --success-soft: oklch(0.28 0.06 155);
  --info: oklch(0.7 0.12 240);
  --info-soft: oklch(0.28 0.06 240);
  --shadow-sm: 0 1px 0 oklch(0 0 0 / 0.3);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3), 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-lg: 0 16px 40px oklch(0 0 0 / 0.5), 0 4px 12px oklch(0 0 0 / 0.3);
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13.5px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
  letter-spacing: -0.005em;
}

.mono { font-family: "Geist Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }
.tabular { font-variant-numeric: tabular-nums; }

button { font: inherit; color: inherit; cursor: pointer; background: none; border: 0; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 2px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

/* layout */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  height: 100vh;
  overflow: hidden;
}
@media (max-width: 880px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none !important; }
  .sidebar.open { display: flex !important; position: fixed; inset: 0 auto 0 0; width: 260px; z-index: 80; box-shadow: var(--shadow-lg); }
  .mobile-scrim { display: block !important; }
}

/* sidebar */
.sidebar {
  background: var(--bg-sunk);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 14px 10px;
  gap: 4px;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 8px 14px;
}
.brand-mark {
  width: 22px; height: 22px;
  border-radius: 5px;
  background: var(--text);
  position: relative;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.brand-mark::before, .brand-mark::after {
  content: "";
  position: absolute;
  background: var(--accent);
}
.brand-mark::before { width: 8px; height: 2px; left: -4px; }
.brand-mark::after { width: 8px; height: 2px; right: -4px; }
.brand-mark span {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 1px;
}
.brand-name {
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.01em;
}
.brand-name b { color: var(--accent); font-weight: 600; }

.sidebar-section { padding: 10px 10px 4px; font-size: 11px; color: var(--text-faint); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 9px;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 80ms ease, color 80ms ease;
  width: 100%;
  text-align: left;
  position: relative;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--border); }
.nav-item .icon { width: 15px; height: 15px; opacity: 0.9; flex-shrink: 0; }
.nav-item .count { margin-left: auto; font-size: 11px; color: var(--text-faint); font-family: "Geist Mono", monospace; }
.nav-item.active .count { color: var(--text-muted); }

.cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.sidebar-foot { margin-top: auto; padding: 8px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-fg); display: grid; place-items: center; font-size: 11px; font-weight: 600; }

/* main column */
.main { display: flex; flex-direction: column; min-width: 0; overflow: hidden; background: var(--bg); }

.topbar {
  height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar .crumbs {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-muted);
  font-size: 13px;
}
.topbar .crumbs .sep { color: var(--text-faint); }
.topbar .crumbs .now { color: var(--text); font-weight: 500; }
.topbar .spacer { flex: 1; }

.k-input {
  display: flex; align-items: center; gap: 8px;
  height: 28px;
  padding: 0 8px 0 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 12.5px;
  min-width: 240px;
  cursor: text;
  transition: border-color 80ms;
}
.k-input:hover { border-color: var(--border-strong); }
.k-input .kbd {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 2px;
  font-family: "Geist Mono", monospace;
  font-size: 11px;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg-sunk);
  border: 1px solid var(--border);
  color: var(--text-faint);
}

.icon-btn {
  width: 28px; height: 28px; border-radius: var(--radius);
  display: grid; place-items: center;
  color: var(--text-muted);
  border: 1px solid transparent;
  transition: background 80ms, border-color 80ms, color 80ms;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn.bordered { border-color: var(--border); background: var(--surface); }

.content { flex: 1; overflow-y: auto; }
.content-inner { padding: 24px 28px 80px; max-width: 1320px; }
@media (max-width: 700px) { .content-inner { padding: 16px 14px 80px; } }

.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px; margin-bottom: 20px;
}
.page-head h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.015em; }
.page-head .sub { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
.page-head .actions { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px;
  padding: 0 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  transition: background 80ms, border-color 80ms, transform 80ms;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn:active { transform: translateY(0.5px); }
.btn.primary {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}
.btn.primary:hover { background: oklch(from var(--text) calc(l + 0.08) c h); }
[data-theme="dark"] .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
[data-theme="dark"] .btn.primary:hover { background: var(--accent-strong); }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--surface-2); }
.btn.sm { height: 26px; padding: 0 8px; font-size: 12px; }
.btn .icon { width: 14px; height: 14px; }

/* cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.card-head { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.card-head h3 { margin: 0; font-size: 13px; font-weight: 600; }
.card-head .sub { font-size: 12px; color: var(--text-muted); }

/* stat */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 1000px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.stat .label { font-size: 12px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 6px; }
.stat .value { font-family: "Geist Mono", monospace; font-size: 26px; font-weight: 500; margin-top: 6px; letter-spacing: -0.02em; }
.stat .delta { font-size: 11.5px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
.stat .delta.up { color: var(--success); }
.stat .delta.down { color: var(--danger); }
.stat .spark { position: absolute; right: 12px; bottom: 12px; opacity: 0.7; }

/* tables */
.tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.tbl-scroll { overflow: auto; max-height: 620px; }
.tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
.tbl thead th {
  position: sticky; top: 0; z-index: 2;
  background: var(--surface-2);
  font-weight: 500;
  font-size: 11.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  user-select: none;
}
.tbl thead th .sort {
  display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
}
.tbl thead th .sort:hover { color: var(--text); }
.tbl tbody td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  height: 36px;
  color: var(--text);
}
.tbl tbody tr { transition: background 60ms; }
.tbl tbody tr:hover { background: var(--surface-2); }
.tbl tbody tr.selected { background: var(--accent-soft); }
.tbl tbody tr.checked { background: var(--accent-soft); }
.cb { width: 15px; height: 15px; min-width: 15px; border: 1.5px solid var(--text-muted); border-radius: 4px; display: grid; place-items: center; cursor: pointer; flex-shrink: 0; background: var(--surface); transition: border-color 80ms, background 80ms; margin: auto; }
.tbl .col-cb { width: 44px; padding: 0 !important; text-align: center; }
.tbl .col-cb .cb { opacity: 0; transition: opacity 80ms, border-color 80ms, background 80ms; }
.tbl tbody tr:hover .col-cb .cb { opacity: 1; }
.tbl.has-selection .col-cb .cb { opacity: 1; }
.tbl thead .col-cb .cb { opacity: 0; }
.tbl.has-selection thead .col-cb .cb { opacity: 1; }
.cb.checked { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
.cb.indeterminate { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
.bulk-bar { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--accent-soft); border-bottom: 1px solid var(--border); font-size: 13px; }
.tbl tbody tr:last-child td { border-bottom: 0; }

.cell-input {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 2px 5px;
  margin: -3px -5px;
  width: calc(100% + 8px);
  font: inherit;
  color: inherit;
  outline: none;
}
.cell-input:hover { border-color: var(--border); background: var(--bg); }
.cell-input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 2px var(--accent-soft); }
.cell-num { font-family: "Geist Mono", monospace; font-variant-numeric: tabular-nums; text-align: right; }

.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 1px 8px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; }
.chip.warn { background: var(--accent-soft); color: var(--accent-fg); border-color: transparent; }
.chip.danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
.chip.ok { background: var(--success-soft); color: var(--success); border-color: transparent; }
.chip.info { background: var(--info-soft); color: var(--info); border-color: transparent; }
[data-theme="dark"] .chip.warn { color: var(--accent); }
[data-theme="dark"] .chip.danger { color: var(--danger); }
[data-theme="dark"] .chip.ok { color: var(--success); }
[data-theme="dark"] .chip.info { color: var(--info); }

.path { font-family: "Geist Mono", monospace; font-size: 12px; color: var(--text-muted); }
.path .seg { color: var(--text); }
.path .sep { color: var(--text-faint); padding: 0 3px; }

/* qty cell with stepper */
.qty {
  display: inline-flex; align-items: center;
  font-family: "Geist Mono", monospace;
  font-variant-numeric: tabular-nums;
}
.qty .v { min-width: 28px; text-align: right; }
.qty .step { width: 18px; height: 18px; display: grid; place-items: center; color: var(--text-faint); border-radius: 3px; opacity: 0; }
.qty .step:hover { background: var(--bg-sunk); color: var(--text); }
tr:hover .qty .step { opacity: 1; }

/* filter bar */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.filter-bar .search {
  display: flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-sunk);
  flex: 1; min-width: 200px;
  max-width: 320px;
}
.filter-bar .search input {
  background: transparent; border: 0; outline: 0;
  font-size: 13px; flex: 1; min-width: 0;
  color: var(--text);
}
.filter-bar .search input::placeholder { color: var(--text-faint); }
.filter-bar .pill {
  display: inline-flex; align-items: center; gap: 5px;
  height: 26px; padding: 0 9px;
  border: 1px dashed var(--border-strong);
  border-radius: 999px;
  font-size: 12px;
  color: var(--text-muted);
}
.filter-bar .pill.active { border-style: solid; background: var(--surface-2); color: var(--text); }
.filter-bar .pill .x { margin-left: 2px; opacity: 0.7; }
.filter-bar .pill:hover { color: var(--text); border-color: var(--text-faint); }
.filter-bar .spacer { flex: 1; }
.filter-bar .count { font-size: 12px; color: var(--text-faint); font-family: "Geist Mono", monospace; }

/* command palette */
.cmd-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: oklch(0.15 0.005 260 / 0.42);
  backdrop-filter: blur(4px);
  display: grid; place-items: flex-start center;
  padding-top: 12vh;
  animation: cmd-fade 120ms ease;
}
@keyframes cmd-fade { from { opacity: 0; } to { opacity: 1; } }
.cmd {
  width: min(560px, 92vw);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: cmd-pop 140ms cubic-bezier(.2,.9,.3,1.15);
}
@keyframes cmd-pop { from { opacity: 0; transform: translateY(-6px) scale(.98); } to { opacity: 1; transform: none; } }
.cmd-input {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.cmd-input input {
  flex: 1; background: transparent; border: 0; outline: 0;
  font-size: 14.5px; color: var(--text);
}
.cmd-input input::placeholder { color: var(--text-faint); }
.cmd-section { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 14px 4px; }
.cmd-list { max-height: 380px; overflow-y: auto; padding-bottom: 6px; }
.cmd-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
}
.cmd-row.active { background: var(--accent-soft); color: var(--accent-fg); }
[data-theme="dark"] .cmd-row.active { color: var(--text); }
.cmd-row .icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-muted); }
.cmd-row.active .icon { color: var(--accent-fg); }
[data-theme="dark"] .cmd-row.active .icon { color: var(--accent); }
.cmd-row .meta { margin-left: auto; font-size: 11.5px; color: var(--text-faint); }
.cmd-foot {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 14px; border-top: 1px solid var(--border);
  font-size: 11.5px; color: var(--text-faint);
  background: var(--bg-sunk);
}
.cmd-foot .kbd {
  font-family: "Geist Mono", monospace; font-size: 10.5px;
  padding: 1px 5px; border-radius: 3px;
  background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
}

/* toast */
.toasts { position: fixed; right: 18px; bottom: 18px; z-index: 90; display: flex; flex-direction: column; gap: 8px; }
.toast {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  padding: 10px 14px 10px 12px;
  min-width: 260px; max-width: 360px;
  animation: t-in 200ms cubic-bezier(.2,.9,.3,1.05);
}
.toast.exit { animation: t-out 180ms ease forwards; }
@keyframes t-in { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes t-out { to { transform: translateY(8px); opacity: 0; } }
.toast .ic { width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; background: var(--success-soft); color: var(--success); }
.toast.warn .ic { background: var(--accent-soft); color: var(--accent-fg); }
.toast.err .ic { background: var(--danger-soft); color: var(--danger); }
.toast .t { font-size: 13px; font-weight: 500; }
.toast .d { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

/* drawer / modal */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 90;
  background: oklch(0.15 0.005 260 / 0.4);
  backdrop-filter: blur(2px);
  animation: cmd-fade 120ms ease;
}
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 91;
  width: min(520px, 92vw);
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  animation: dr-in 180ms cubic-bezier(.2,.9,.3,1);
}
@keyframes dr-in { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
.drawer-head { display: flex; align-items: center; gap: 8px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.drawer-head h3 { margin: 0; font-size: 15px; font-weight: 600; flex: 1; }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
.drawer-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; background: var(--bg-sunk); }

.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.field > label { font-size: 11.5px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.input, .select, .textarea {
  background: var(--bg-sunk);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 80ms, box-shadow 80ms;
}
.input:focus, .select:focus, .textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.textarea { min-height: 70px; resize: vertical; font-family: inherit; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* drag-drop image area */
.dropzone {
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius-lg);
  background: var(--bg-sunk);
  padding: 18px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  transition: all 100ms;
  cursor: pointer;
}
.dropzone.hover { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-fg); }
.dropzone .big { font-size: 14px; color: var(--text); font-weight: 500; margin-bottom: 2px; }

/* storage tree */
.tree { font-size: 13px; }
.tree-node {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  user-select: none;
}
.tree-node:hover { background: var(--surface-2); }
.tree-node.active { background: var(--accent-soft); color: var(--accent-fg); }
[data-theme="dark"] .tree-node.active { color: var(--text); }
.tree-node .chev { width: 14px; height: 14px; transition: transform 120ms; color: var(--text-faint); }
.tree-node .chev.open { transform: rotate(90deg); }
.tree-node .ic { width: 14px; height: 14px; color: var(--text-muted); flex-shrink: 0; }
.tree-node .count { font-family: "Geist Mono", monospace; font-size: 11px; color: var(--text-faint); }
.tree-node .tree-actions { display: flex; gap: 1px; margin-left: auto; opacity: 0; transition: opacity 80ms; }
.tree-node:hover .tree-actions, .tree-node.active .tree-actions { opacity: 1; }
.tree-node .tree-actions .icon-btn { width: 18px; height: 18px; border-radius: 3px; }
.tree-children { margin-left: 14px; border-left: 1px dashed var(--border); padding-left: 4px; }

/* skeleton list of recent */
.list-row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.list-row:last-child { border-bottom: 0; }
.list-row .name { font-weight: 500; }
.list-row .meta { color: var(--text-muted); font-size: 12px; }
.list-row .time { margin-left: auto; color: var(--text-faint); font-size: 11.5px; font-family: "Geist Mono", monospace; }

/* details page */
.detail-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
@media (max-width: 980px) { .detail-grid { grid-template-columns: 1fr; } }

.image-frame {
  background: var(--bg-sunk);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  aspect-ratio: 4/3;
  display: grid; place-items: center;
  position: relative; overflow: hidden;
}
.image-frame .placeholder {
  width: 100%; height: 100%;
  background: repeating-linear-gradient(135deg, transparent 0 10px, oklch(from var(--border) l c h / 0.5) 10px 11px);
  display: grid; place-items: center;
  color: var(--text-faint);
  font-family: "Geist Mono", monospace;
  font-size: 11.5px;
}
.thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
.thumbs .image-frame { aspect-ratio: 1; border-radius: 6px; }

.spec-tbl { width: 100%; font-size: 13px; border-collapse: collapse; }
.spec-tbl td { padding: 7px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
.spec-tbl tr:last-child td { border-bottom: 0; }
.spec-tbl td:first-child { color: var(--text-muted); width: 38%; }
.spec-tbl td:last-child { font-family: "Geist Mono", monospace; }

/* spark / chart */
.bars { display: flex; align-items: flex-end; gap: 3px; height: 60px; padding: 12px 14px; }
.bars .b { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 3px; opacity: 0.85; transition: opacity 60ms; }
.bars .b:hover { opacity: 1; }
.bars .b.neg { background: var(--text-faint); }

.history {
  font-size: 12px;
}
.history .h-row {
  display: grid; grid-template-columns: 84px 1fr auto; gap: 10px;
  padding: 7px 0;
  border-bottom: 1px dashed var(--border);
  align-items: center;
}
.history .h-row:last-child { border-bottom: 0; }
.history .date { font-family: "Geist Mono", monospace; color: var(--text-faint); font-size: 11.5px; }
.history .delta { font-family: "Geist Mono", monospace; font-weight: 500; }
.history .delta.up { color: var(--success); }
.history .delta.down { color: var(--danger); }

/* project */
.project-card { display: flex; flex-direction: column; padding: 14px 16px; gap: 8px; cursor: pointer; transition: border-color 100ms, background 100ms; }
.project-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
.project-card .title { font-weight: 600; font-size: 14px; }
.project-card .desc { color: var(--text-muted); font-size: 12.5px; min-height: 36px; }
.project-card .stats { display: flex; gap: 12px; margin-top: auto; font-size: 12px; color: var(--text-muted); }
.project-card .stats b { color: var(--text); font-family: "Geist Mono", monospace; font-weight: 500; }
.proj-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 1100px) { .proj-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px) { .proj-grid { grid-template-columns: 1fr; } }

.bom-status { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
.bom-bar { width: 100%; height: 4px; border-radius: 999px; background: var(--bg-sunk); overflow: hidden; }
.bom-bar > div { height: 100%; background: var(--accent); border-radius: 999px; transition: width 200ms; }
.bom-bar > div.short { background: var(--danger); }

/* utility */
.muted { color: var(--text-muted); }
.faint { color: var(--text-faint); }
.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; }
.gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; }

.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* hidden scrollbar when needed */
.thin-scroll::-webkit-scrollbar { width: 6px; height: 6px; }

/* mobile menu trigger */
.mobile-only { display: none; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Synthetic quantity history for chart
function genHistory(p) {
  // 12 month deltas
  const months = ["Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb"];
  const seed = p.id.charCodeAt(1) + p.id.charCodeAt(2);
  let qty = Math.max(0, p.qty - Math.round(seed % 30));
  const rows = [];
  for (let i = 0; i < 12; i++) {
    const r = ((seed + i * 31) % 17) - 7;
    const delta = i < 6 ? Math.abs(r) : r;
    qty = Math.max(0, qty + delta);
    rows.push({ m: months[i], qty, d: delta });
  }
  // Force end to match current
  rows[rows.length - 1].qty = p.qty;
  return rows;
}

function addChildToTree(nodes, parentId, child) {
  return nodes.map(n => {
    if (n.id === parentId) return { ...n, children: [...(n.children || []), child] };
    if (n.children) return { ...n, children: addChildToTree(n.children, parentId, child) };
    return n;
  });
}
function renameInTree(nodes, id, name) {
  return nodes.map(n => {
    if (n.id === id) return { ...n, name };
    if (n.children) return { ...n, children: renameInTree(n.children, id, name) };
    return n;
  });
}
function removeFromTree(nodes, id) {
  return nodes.filter(n => n.id !== id).map(n =>
    n.children ? { ...n, children: removeFromTree(n.children, id) } : n
  );
}

function extractAmazonImage(url) {
  if (!url) return url;
  // Detect any Amazon domain (amazon.com, amazon.be, amazon.co.uk, amazon.de, etc.)
  if (!/amazon\./i.test(url)) return url;
  // ASIN is a 10-char alphanumeric string after /dp/ or /gp/product/
  const m = url.match(/\/(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
  if (!m) return url;
  return `https://images-na.ssl-images-amazon.com/images/P/${m[1]}.01.LZZZZZZZ.jpg`;
}

        <span className="icon">{icons.plus}</span>
        Add part
      </button>
    </header>
  );
}

function CommandPalette({ open, onClose, parts, projects, navigate, theme, setTheme, addPart, addProject }) {
  const [q, setQ] = useState("");
  const [idx, setIdx] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => {
    if (open) {
      setQ("");
      setIdx(0);
      setTimeout(() => inputRef.current && inputRef.current.focus(), 30);
    }
  }, [open]);

  const items = useMemo(() => {
    const Q = q.trim().toLowerCase();
    const actions = [
      { id: "act:add", t: "Add new part", section: "Actions", icon: "plus", run: () => { onClose(); addPart(); } },
      { id: "act:newproj", t: "New project", section: "Actions", icon: "project", run: () => { onClose(); addProject(); } },
      { id: "act:dashboard", t: "Go to Dashboard", section: "Actions", icon: "dashboard", run: () => { onClose(); navigate("dashboard"); } },
      { id: "act:parts", t: "Go to Parts", section: "Actions", icon: "parts", run: () => { onClose(); navigate({ name: "parts" }); } },
      { id: "act:storage", t: "Go to Storage", section: "Actions", icon: "storage", run: () => { onClose(); navigate("storage"); } },
      { id: "act:projects", t: "Go to Projects", section: "Actions", icon: "project", run: () => { onClose(); navigate("projects"); } },
      { id: "act:theme", t: theme === "dark" ? "Switch to light mode" : "Switch to dark mode", section: "Actions", icon: theme === "dark" ? "sun" : "moon", run: () => { onClose(); setTheme(theme === "dark" ? "light" : "dark"); } },
      { id: "act:low", t: "Show low-stock parts", section: "Actions", icon: "alert", run: () => { onClose(); navigate({ name: "parts", filter: "low" }); } },
    ];
    const partItems = parts.map(p => ({
      id: "p:" + p.id,
      t: p.name,
      meta: p.mpn,
      section: "Parts",
      icon: window.CATEGORIES.find(c => c.id === p.cat)?.icon || "misc",
      run: () => { onClose(); navigate({ name: "part", id: p.id }); },
    }));
    const projItems = projects.map(p => ({
      id: "pr:" + p.id,
      t: p.name,
      section: "Projects",
      icon: "project",
      run: () => { onClose(); navigate({ name: "project", id: p.id }); },
    }));
    const all = [...actions, ...partItems, ...projItems];
    if (!Q) return all.slice(0, 8).concat(partItems.slice(0, 6));
    return all.filter(it =>
      it.t.toLowerCase().includes(Q) || (it.meta || "").toLowerCase().includes(Q)
    ).slice(0, 14);
  }, [q, parts, projects, theme]);

  useEffect(() => { setIdx(0); }, [q]);

  useEffect(() => {
    if (!open) return;
    function onKey(e) {
      if (e.key === "Escape") { e.preventDefault(); onClose(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); setIdx(i => Math.min(items.length - 1, i + 1)); }
      else if (e.key === "ArrowUp") { e.preventDefault(); setIdx(i => Math.max(0, i - 1)); }
      else if (e.key === "Enter") { e.preventDefault(); items[idx] && items[idx].run(); }
    }
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [open, items, idx]);

  if (!open) return null;

  // Group by section preserving order
  const grouped = [];
  let last = null;
  items.forEach((it, i) => {
    if (it.section !== last) { grouped.push({ section: it.section, items: [] }); last = it.section; }
    grouped[grouped.length - 1].items.push({ ...it, i });
  });

  return (
    <div className="cmd-backdrop" onClick={onClose}>
      <div className="cmd" onClick={e => e.stopPropagation()}>
        <div className="cmd-input">
          <span style={{ color: "var(--text-faint)" }}>{icons.search}</span>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)} placeholder="Type a command or search…" />
          <span style={{ fontSize: 11, color: "var(--text-faint)", fontFamily: "Geist Mono" }}>esc</span>
        </div>
        <div className="cmd-list">
          {grouped.length === 0 && (
            <div style={{ padding: "30px", textAlign: "center", color: "var(--text-faint)", fontSize: 13 }}>
              No matches
            </div>
          )}
          {grouped.map((g, gi) => (
            <div key={gi}>
              <div className="cmd-section">{g.section}</div>
              {g.items.map(it => (
                <div
                  key={it.id}
                  className={"cmd-row" + (it.i === idx ? " active" : "")}
                  onMouseEnter={() => setIdx(it.i)}
                  onClick={() => it.run()}
                >
                  <span className="icon">{icons[it.icon]}</span>
                  <span>{it.t}</span>
                  {it.meta && <span className="meta mono">{it.meta}</span>}
                  {it.i === idx && <span className="meta">↵</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="cmd-foot">
          <span><span className="kbd">↑↓</span> navigate</span>
          <span><span className="kbd">↵</span> select</span>
          <span><span className="kbd">esc</span> close</span>
          <span style={{ marginLeft: "auto" }}>{items.length} results</span>
        </div>
      </div>
    </div>
  );
}

function Toasts({ toasts, dismiss }) {
  return (
    <div className="toasts">
      {toasts.map(t => (
        <div key={t.id} className={"toast" + (t.kind ? " " + t.kind : "") + (t.exit ? " exit" : "")}>
          <div className="ic">
            {t.kind === "err" ? icons.x : t.kind === "warn" ? icons.alert : icons.check}
          </div>
          <div style={{ flex: 1 }}>
            <div className="t">{t.title}</div>
            {t.desc && <div className="d">{t.desc}</div>}
          </div>
          <button className="icon-btn" style={{ width: 22, height: 22 }} onClick={() => dismiss(t.id)}>{icons.x}</button>
        </div>
      ))}
    </div>
  );
}

function MobileNav({ page, setPage }) {
  const active = (p) => {
    if (p === "dashboard") return page === "dashboard";
    if (p === "parts") return typeof page === "object" ? page.name === "parts" : false;
    if (p === "storage") return page === "storage";
    if (p === "projects") return page === "projects" || (typeof page === "object" && page.name === "project");
    return false;
  };
  const go = (p) => {
    if (p === "parts") setPage({ name: "parts" });
    else setPage(p);
  };
  return (
    <nav className="mobile-nav">
      {[
        { key: "dashboard", label: "Home", icon: icons.dashboard },
        { key: "parts",     label: "Parts",    icon: icons.parts },
        { key: "storage",   label: "Storage",  icon: icons.storage },
        { key: "projects",  label: "Projects", icon: icons.project },
      ].map(({ key, label, icon }) => (
        <button key={key} className={"mobile-nav-item" + (active(key) ? " active" : "")} onClick={() => go(key)}>
          {icon}
          <span>{label}</span>
        </button>
      ))}
    </nav>
  );
}

Object.assign(window, { Sidebar, Topbar, CommandPalette, Toasts, MobileNav });

  </script>

  <script type="text/babel">
/* global React, icons, Ic, CATEGORIES, LOC_INDEX, PARTS, PROJECTS, genHistory, extractAmazonImage */
// Page-level components: Dashboard, PartsList, PartDetail, Storage, Projects/BOM

const { useState, useEffect, useRef, useMemo } = React;

// ---------- helpers ----------

function effectiveMin(p) {
  const need = (window.PROJECTS || []).reduce((a, proj) => {
    const b = proj.bom ? proj.bom.find(x => x.partId === p.id) : null;
    return a + (b ? b.need : 0);
  }, 0);
  return Math.max(p.min, need);
}

function statusOf(p) {
  const min = effectiveMin(p);
  if (p.qty === 0 && min > 0) return { kind: "danger", label: "Out" };
  if (p.qty < min) return { kind: "danger", label: "Short" };
  if (min > 0 && p.qty < min * 1.5) return { kind: "warn", label: "Low" };
  return { kind: "ok", label: "OK" };
}

function CatChip({ cat }) {
  const c = window.CATEGORIES.find(x => x.id === cat);
  if (!c) return null;
  return (
    <span className="chip" style={{ background: "transparent" }}>
      <span className="dot" style={{ background: c.color }}></span>
      {c.label}
    </span>
  );
}

function LocPath({ id }) {
  const l = LOC_INDEX[id];
  if (!l) return <span className="path">—</span>;
  return (
    <span className="path">
      {l.path.map((seg, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span className="sep">›</span>}
          <span className={i === l.path.length - 1 ? "seg" : ""}>{seg}</span>
        </React.Fragment>
      ))}
    </span>
  );
}

// ---------- Dashboard ----------

function Dashboard({ parts, projects, navigate }) {
  const total = parts.reduce((a, p) => a + p.qty, 0);
  const unique = parts.length;
  const low = parts.filter(p => p.qty < effectiveMin(p)).length;
  const value = parts.reduce((a, p) => a + (p.qty * (p.price || 0)), 0);
  const recent = [...parts].sort((a, b) => b.added.localeCompare(a.added)).slice(0, 6);
  const lowList = parts.filter(p => p.qty < effectiveMin(p)).sort((a, b) => {
    const am = effectiveMin(a), bm = effectiveMin(b);
    return (a.qty / (am || 1)) - (b.qty / (bm || 1));
  }).slice(0, 6);

  // category breakdown bars
  const cats = window.CATEGORIES.map(c => ({
    ...c,
    n: parts.filter(p => p.cat === c.id).length,
    q: parts.filter(p => p.cat === c.id).reduce((a, p) => a + p.qty, 0),
  })).filter(c => c.n > 0);
  const maxQ = Math.max(...cats.map(c => c.q));

  return (
    <div className="content-inner">
      <div className="page-head">
        <div>
          <h1>Dashboard</h1>
          <div className="sub">Welcome back. Here's what's in the lab today.</div>
        </div>
        <div className="actions">
          <button className="btn"><span className="icon">{icons.download}</span>Export CSV</button>
        </div>
      </div>

      <div className="stat-grid">
        <StatCard label="Total parts" value={total.toLocaleString()} delta="+218 this month" up icon="cube" />
        <StatCard label="Unique SKUs" value={unique} delta={`across ${cats.filter(c => c.n).length} categories`} icon="parts" />
        <StatCard label="Low stock" value={low} delta={low > 0 ? "needs attention" : "all healthy"} down={low > 0} icon="alert" onClick={() => navigate({ name: "parts", filter: "low" })} />
        <StatCard label="Estimated value" value={"$" + value.toFixed(0)} delta="parts only, excl. tools" icon="cube" />
      </div>

      <div className="mt-16" style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 16 }}>
        <div className="card">
          <div className="card-head">
            <h3>Low stock — order soon</h3>
            <span className="sub">below safety threshold</span>
            <span style={{ marginLeft: "auto" }}>
              <button className="btn sm ghost" onClick={() => navigate({ name: "parts", filter: "low" })}>
                View all <span className="icon">{icons.arrowRight}</span>
              </button>
            </span>
          </div>
          <div>
            {lowList.length === 0 && (
              <div style={{ padding: 28, textAlign: "center", color: "var(--text-muted)", fontSize: 13 }}>
                Nothing low — all stocked.
              </div>
            )}
            {lowList.map(p => {
              const emin = effectiveMin(p);
              const pct = Math.min(100, emin > 0 ? (p.qty / emin) * 100 : 100);
              const cat = window.CATEGORIES.find(c => c.id === p.cat);
              return (
                <div key={p.id} className="list-row" onClick={() => navigate({ name: "part", id: p.id })} style={{ cursor: "pointer" }}>
                  <span className="cat-dot" style={{ background: cat?.color }}></span>
                  <div style={{ display: "flex", flexDirection: "column", flex: 1, minWidth: 0 }}>
                    <div className="name" style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                      <span className="chip danger">{p.qty}/{emin}</span>
                    </div>
                    <div className="bom-bar" style={{ marginTop: 5 }}><div className="short" style={{ width: pct + "%" }}></div></div>
                  </div>
                  <div className="time mono">{p.mpn}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="card">
          <div className="card-head">
            <h3>By category</h3>
            <span className="sub">total quantity</span>
          </div>
          <div style={{ padding: "10px 14px" }}>
            {cats.map(c => (
              <div key={c.id} style={{ display: "grid", gridTemplateColumns: "100px 1fr 56px", gap: 8, alignItems: "center", padding: "6px 0", cursor: "pointer" }} onClick={() => navigate({ name: "parts", cat: c.id })}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12.5 }}>
                  <span className="cat-dot" style={{ background: c.color }}></span>{c.label}
                </div>
                <div className="bom-bar" style={{ height: 6 }}>
                  <div style={{ width: (maxQ ? (c.q / maxQ * 100) : 0) + "%", background: c.color }}></div>
                </div>
                <div className="mono tabular" style={{ textAlign: "right", fontSize: 12.5, color: "var(--text-muted)" }}>{c.q.toLocaleString()}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="mt-16" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div className="card">
          <div className="card-head">
            <h3>Recently added</h3>
            <span style={{ marginLeft: "auto" }}>
              <button className="btn sm ghost" onClick={() => navigate({ name: "parts", filter: "recent" })}>
                View all <span className="icon">{icons.arrowRight}</span>
              </button>
            </span>
          </div>
          <div>
            {recent.map(p => {
              const cat = window.CATEGORIES.find(c => c.id === p.cat);
              return (
                <div key={p.id} className="list-row" style={{ cursor: "pointer" }} onClick={() => navigate({ name: "part", id: p.id })}>
                  <span className="cat-dot" style={{ background: cat?.color }}></span>
                  <div className="col" style={{ flex: 1 }}>
                    <div className="name">{p.name}</div>
                    <div className="meta">{p.mfg} · <span className="mono">{p.mpn}</span></div>
                  </div>
                  <div className="time">{p.added}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="card">
          <div className="card-head">
            <h3>Active projects</h3>
            <span style={{ marginLeft: "auto" }}>
              <button className="btn sm ghost" onClick={() => navigate("projects")}>
                View all <span className="icon">{icons.arrowRight}</span>
              </button>
            </span>
          </div>
          <div>
            {projects.slice(0, 4).map(pr => {
              const total = pr.bom.reduce((a, b) => a + b.need, 0);
              const have = pr.bom.reduce((a, b) => {
                const part = parts.find(p => p.id === b.partId);
                return a + Math.min(b.need, part ? part.qty : 0);
              }, 0);
              const pct = total ? Math.round(have / total * 100) : 0;
              return (
                <div key={pr.id} className="list-row" style={{ cursor: "pointer" }} onClick={() => navigate({ name: "project", id: pr.id })}>
                  <span className="icon" style={{ color: "var(--text-muted)" }}>{icons.project}</span>
                  <div className="col" style={{ flex: 1 }}>
                    <div className="name">{pr.name}</div>
                    <div className="bom-bar" style={{ marginTop: 4 }}>
                      <div className={pct < 100 ? "short" : ""} style={{ width: pct + "%" }}></div>
                    </div>
                  </div>
                  <div className="time">{pr.status} · {pct}%</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function StatCard({ label, value, delta, up, down, icon, onClick }) {
  return (
    <div className="stat" onClick={onClick} style={{ cursor: onClick ? "pointer" : "default" }}>
      <div className="label">
        <span style={{ color: "var(--text-faint)" }}>{icons[icon]}</span>
        {label}
      </div>
      <div className="value tabular">{value}</div>
      <div className={"delta" + (up ? " up" : "") + (down ? " down" : "")}>
        {up && <span className="icon">{icons.arrowUp}</span>}
        {down && <span className="icon">{icons.arrowDown}</span>}
        {delta}
      </div>
    </div>
  );
}

// ---------- Parts List ----------

function PartsList({ parts, navigate, updatePart, deletePart, openAdd, openEdit, openDelete, initialCat, initialFilter, addToast }) {
  const [query, setQuery] = useState("");
  const [catFilter, setCatFilter] = useState(initialCat || null);
  const [locFilter, setLocFilter] = useState(null);
  const [stockFilter, setStockFilter] = useState(initialFilter === "low" ? "low" : null);
  const [sortKey, setSortKey] = useState(initialFilter === "recent" ? "added" : "name");
  const [sortDir, setSortDir] = useState(initialFilter === "recent" ? "desc" : "asc");
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [editing, setEditing] = useState(null); // { id, field }

  useEffect(() => {
    setCatFilter(initialCat || null);
    if (initialFilter === "low") { setStockFilter("low"); setSortKey("name"); setSortDir("asc"); }
    else if (initialFilter === "recent") { setStockFilter(null); setSortKey("added"); setSortDir("desc"); }
    else { setStockFilter(null); }
  }, [initialCat, initialFilter]);

  const filtered = useMemo(() => {
    let r = parts;
    if (catFilter) r = r.filter(p => p.cat === catFilter);
    if (locFilter) r = r.filter(p => p.loc === locFilter);
    if (stockFilter === "low") r = r.filter(p => p.qty < effectiveMin(p));
    if (query.trim()) {
      const q = query.toLowerCase();
      r = r.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.mfg.toLowerCase().includes(q) ||
        p.mpn.toLowerCase().includes(q) ||
        (p.notes || "").toLowerCase().includes(q) ||
        (p.value || "").toLowerCase().includes(q)
      );
    }
    r = [...r].sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (typeof av === "string") { av = av.toLowerCase(); bv = (bv || "").toLowerCase(); }
      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return r;
  }, [parts, query, catFilter, locFilter, stockFilter, sortKey, sortDir]);

  const allChecked = filtered.length > 0 && filtered.every(p => selectedIds.has(p.id));
  const someChecked = filtered.some(p => selectedIds.has(p.id));
  const toggleOne = (id) => { setSelectedIds(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; }); };
  const toggleAll = () => setSelectedIds(allChecked ? new Set() : new Set(filtered.map(p => p.id)));
  const clearSelection = () => setSelectedIds(new Set());
  const deleteSelected = () => {
    selectedIds.forEach(id => deletePart(id));
    addToast({ kind: "warn", title: `${selectedIds.size} part${selectedIds.size > 1 ? "s" : ""} deleted` });
    setSelectedIds(new Set());
  };

  const toggleSort = key => {
    if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("asc"); }
  };

  const sortIcon = key => {
    if (sortKey !== key) return <span style={{ opacity: 0.3 }}>{icons.sort}</span>;
    return sortDir === "asc" ? icons.arrowUp : icons.arrowDown;
  };

  const catLabel = catFilter ? window.CATEGORIES.find(c => c.id === catFilter)?.label : null;
  const locLabel = locFilter ? LOC_INDEX[locFilter]?.name : null;

  return (
    <div className="content-inner">
      <div className="page-head">
        <div>
          <h1>Parts</h1>
          <div className="sub">{filtered.length} of {parts.length} parts · click any cell to edit inline</div>
        </div>
        <div className="actions">
          <button className="btn"><span className="icon">{icons.upload}</span>Import</button>
          <button className="btn primary" onClick={openAdd}><span className="icon">{icons.plus}</span>Add part</button>
        </div>
      </div>

      <div className="tbl-wrap">
        <div className="filter-bar">
          <div className="search">
            <span style={{ color: "var(--text-faint)" }}>{icons.search}</span>
            <input
              placeholder="Search name, MPN, manufacturer, notes…"
              value={query}
              onChange={e => setQuery(e.target.value)}
            />
            {query && <button className="icon-btn" style={{ width: 18, height: 18 }} onClick={() => setQuery("")}>{icons.x}</button>}
          </div>

          {catLabel ? (
            <button className="pill active" onClick={() => setCatFilter(null)}>
              Category: <b style={{ marginLeft: 4, color: "var(--text)" }}>{catLabel}</b>
              <span className="x">{icons.x}</span>
            </button>
          ) : (
            <CatDropdown setCat={setCatFilter} />
          )}
          {locLabel ? (
            <button className="pill active" onClick={() => setLocFilter(null)}>
              Location: <b style={{ marginLeft: 4, color: "var(--text)" }}>{locLabel}</b>
              <span className="x">{icons.x}</span>
            </button>
          ) : (
            <button className="pill" onClick={() => addToast({ kind: "warn", title: "Filter from sidebar", desc: "Pick a bin in Storage to filter here." })}>
              <span className="icon">{icons.storage}</span> Location
            </button>
          )}
          <button
            className={"pill" + (stockFilter === "low" ? " active" : "")}
            onClick={() => setStockFilter(stockFilter === "low" ? null : "low")}
          >
            <span className="icon" style={{ color: stockFilter === "low" ? "var(--danger)" : "inherit" }}>{icons.alert}</span>
            Low stock
            {stockFilter === "low" && <span className="x">{icons.x}</span>}
          </button>

          <div className="spacer"></div>
          <div className="count">{filtered.length} rows</div>
        </div>

        {someChecked && (
          <div className="bulk-bar">
            <span style={{ fontWeight: 500 }}>{selectedIds.size} selected</span>
            <button className="btn sm ghost" onClick={clearSelection}>Deselect all</button>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              <button className="btn sm" style={{ color: "var(--danger)" }} onClick={deleteSelected}>
                <span className="icon">{icons.trash}</span> Delete selected
              </button>
            </div>
          </div>
        )}

        <div className="tbl-scroll">
          <table className={"tbl" + (someChecked ? " has-selection" : "")}>
            <thead>
              <tr>
                <th className="col-cb">
                  <div className={"cb" + (allChecked ? " checked" : someChecked ? " indeterminate" : "")} onClick={toggleAll}>
                    {allChecked && <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12" /></svg>}
                    {!allChecked && someChecked && <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="3"><line x1="5" y1="12" x2="19" y2="12" /></svg>}
                  </div>
                </th>
                <th style={{ minWidth: 260 }}>
                  <span className="sort" onClick={() => toggleSort("name")}>Part name <span className="icon">{sortIcon("name")}</span></span>
                </th>
                <th style={{ width: 130 }}>

function CatDropdown({ setCat }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const onDoc = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);
  return (
    <div style={{ position: "relative" }} ref={ref}>
      <button className="pill" onClick={() => setOpen(o => !o)}>
        <span className="icon">{icons.filter}</span> Category
      </button>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, boxShadow: "var(--shadow-md)", padding: 6, zIndex: 10, minWidth: 160 }}>
          {window.CATEGORIES.map(c => (
            <button key={c.id} className="cmd-row" style={{ width: "100%", padding: "6px 10px", borderRadius: 5 }} onClick={() => { setCat(c.id); setOpen(false); }}>
              <span className="cat-dot" style={{ background: c.color }}></span>
              {c.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function RowMenu({ onView, onEdit, onDelete }) {
  const [pos, setPos] = useState(null);
  const btnRef = useRef(null);
  useEffect(() => {
    if (!pos) return;
    const onDoc = e => { if (btnRef.current && !btnRef.current.contains(e.target)) setPos(null); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [pos]);
  const toggle = (e) => {
    e.stopPropagation();
    if (pos) { setPos(null); return; }
    const r = e.currentTarget.getBoundingClientRect();
    const menuH = 110;
    const openUp = r.bottom + menuH + 8 > window.innerHeight;
    setPos({ right: window.innerWidth - r.right, ...(openUp ? { bottom: window.innerHeight - r.top + 4 } : { top: r.bottom + 4 }) });
  };
  return (
    <div ref={btnRef} style={{ position: "relative" }}>
      <button className="icon-btn" style={{ width: 24, height: 24 }} onClick={toggle}>{icons.more}</button>
      {pos && (
        <div style={{ position: "fixed", ...pos, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, boxShadow: "var(--shadow-md)", padding: 4, zIndex: 200, minWidth: 140 }}>
          <button className="cmd-row" style={{ width: "100%", padding: "6px 10px", borderRadius: 5 }} onClick={(e) => { e.stopPropagation(); setPos(null); onView(); }}>
            <span className="icon">{icons.arrowRight}</span> Open
          </button>
          <button className="cmd-row" style={{ width: "100%", padding: "6px 10px", borderRadius: 5 }} onClick={(e) => { e.stopPropagation(); setPos(null); onEdit(); }}>
            <span className="icon">{icons.edit}</span> Edit
          </button>
          <button className="cmd-row" style={{ width: "100%", padding: "6px 10px", borderRadius: 5, color: "var(--danger)" }} onClick={(e) => { e.stopPropagation(); setPos(null); onDelete(); }}>
            <span className="icon">{icons.trash}</span> Delete
          </button>
        </div>
      )}
    </div>
  );
}

function LocationModal({ open, title, initial, onClose, onSave }) {
  const [name, setName] = React.useState("");
  const inputRef = React.useRef(null);
  React.useEffect(() => {
    if (open) { setName(initial || ""); setTimeout(() => inputRef.current && inputRef.current.focus(), 30); }
  }, [open]);
  if (!open) return null;
  const submit = () => { if (name.trim()) { onSave(name.trim()); onClose(); } };
  return (
    <>
      <div className="modal-backdrop" onClick={onClose}></div>
      <div style={{ position: "fixed", top: "30%", left: "50%", transform: "translate(-50%, -50%)", zIndex: 92, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-lg)", padding: 20, width: 320 }}>
        <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>{title}</div>
        <input ref={inputRef} className="input" style={{ width: "100%" }} placeholder="Location name" value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") submit(); if (e.key === "Escape") onClose(); }} />
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12 }}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" disabled={!name.trim()} onClick={submit}>Save</button>
        </div>
      </div>
    </>
  );
}

function Storage({ parts, navigate, locations, locIndex, addLocation, renameLocation, deleteLocation }) {
  const [selected, setSelected] = useState(() => {
    const first = locations[0];
    return first ? first.id : "";
  });
  const [open, setOpen] = useState(() => {
    const o = {};
    if (locations[0]) o[locations[0].id] = true;
    return o;
  });
  const [modal, setModal] = useState(null); // { mode: "new"|"sub"|"rename", parentId?, nodeId?, name? }

  const countAt = (nodeId) => {
    const collectIds = (id) => {
      const ids = [id];
      const node = findNode(locations, id);
      if (node && node.children) node.children.forEach(c => ids.push(...collectIds(c.id)));
      return ids;
    };
    return parts.filter(p => collectIds(nodeId).includes(p.loc)).reduce((a, b) => a + b.qty, 0);
  };

  const inBin = useMemo(() => parts.filter(p => p.loc === selected), [parts, selected]);
  const selNode = locIndex[selected];

  const handleModalSave = (name) => {
    if (modal.mode === "new") {
      addLocation(null, name);
    } else if (modal.mode === "sub") {
      addLocation(modal.parentId, name);
    } else if (modal.mode === "rename") {
      renameLocation(modal.nodeId, name);
    }
  };

  return (
    <div className="content-inner">
      <div className="page-head">
        <div>
          <h1>Storage</h1>
          <div className="sub">Workshop → Shelf → Drawer → Bin · everything has a place</div>
        </div>
        <div className="actions">
          <button className="btn" onClick={() => setModal({ mode: "new" })}>
            <span className="icon">{icons.plus}</span>New location
          </button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 16 }}>
        <div className="card" style={{ padding: 10 }}>
          <div className="tree">
            {locations.map(n => (
              <TreeNode key={n.id} node={n} depth={0} open={open} setOpen={setOpen}
                selected={selected} setSelected={setSelected} countAt={countAt}
                onRename={(id, name) => setModal({ mode: "rename", nodeId: id, name })}
                onDelete={deleteLocation}
                onAddChild={(id) => setModal({ mode: "sub", parentId: id })}
              />
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-head">
            <div>
              <h3>{selNode ? selNode.name : "—"}</h3>
              <LocPath id={selected} locIndex={locIndex} />
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
              <button className="btn sm" onClick={() => selNode && setModal({ mode: "rename", nodeId: selected, name: selNode.name })}>
                <span className="icon">{icons.edit}</span>Rename
              </button>
              <button className="btn sm" onClick={() => setModal({ mode: "sub", parentId: selected })}>
                <span className="icon">{icons.plus}</span>Sub-location
              </button>
              <button className="btn sm" style={{ color: "var(--danger)" }} onClick={() => deleteLocation(selected)}>
                <span className="icon">{icons.trash}</span>
              </button>
            </div>
          </div>

          <div style={{ padding: "12px 14px", display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            <MiniStat label="Direct parts" value={inBin.length} />
            <MiniStat label="Total quantity" value={inBin.reduce((a, p) => a + p.qty, 0).toLocaleString()} />
            <MiniStat label="Low stock here" value={inBin.filter(p => p.qty < effectiveMin(p)).length} />
          </div>

          <div className="card-head" style={{ borderTop: "1px solid var(--border)" }}>
            <h3>Parts here</h3>
            <span className="sub">{inBin.length} items</span>
          </div>
          <div className="tbl-scroll" style={{ maxHeight: 380 }}>
            <table className="tbl">
              <thead>
                <tr>
                  <th></th><th>Part</th><th>Category</th>
                  <th style={{ textAlign: "right" }}>Qty</th><th>Status</th>
                </tr>
              </thead>
              <tbody>
                {inBin.length === 0 && (
                  <tr><td colSpan="5" style={{ padding: 30, textAlign: "center", color: "var(--text-faint)" }}>No parts in this location</td></tr>
                )}
                {inBin.map(p => {
                  const cat = window.CATEGORIES.find(c => c.id === p.cat);
                  const st = statusOf(p);
                  return (
                    <tr key={p.id} onClick={() => navigate({ name: "part", id: p.id })} style={{ cursor: "pointer" }}>
                      <td><span className="cat-dot" style={{ background: cat?.color }}></span></td>
                      <td><span style={{ fontWeight: 500 }}>{p.name}</span> <span className="mono faint" style={{ fontSize: 11, marginLeft: 6 }}>{p.mpn}</span></td>
                      <td><CatChip cat={p.cat} /></td>
                      <td className="cell-num">{p.qty}</td>

                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <LocationModal
        open={!!modal}
        title={modal?.mode === "rename" ? "Rename location" : modal?.mode === "sub" ? "New sub-location" : "New location"}

        onClose={() => setModal(null)}
        onSave={handleModalSave}
      />
    </div>
  );

function MiniStat({ label, value }) {
  return (
    <div style={{ background: "var(--bg-sunk)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 12px" }}>
      <div style={{ fontSize: 11.5, color: "var(--text-muted)" }}>{label}</div>
      <div className="mono" style={{ fontSize: 20, fontWeight: 500, marginTop: 2 }}>{value}</div>
    </div>
  );
}

function findNode(nodes, id) {
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) { const f = findNode(n.children, id); if (f) return f; }
  }
  return null;
}

function TreeNode({ node, depth, open, setOpen, selected, setSelected, countAt, onRename, onDelete, onAddChild }) {
  const isOpen = !!open[node.id];
  const has = node.children && node.children.length;
  const ic = depth === 0 ? "storage" : depth === 1 ? "folder" : depth === 2 ? "folder" : "cube";
  return (
    <>
      <div
        className={"tree-node" + (selected === node.id ? " active" : "")}
        onClick={() => { setSelected(node.id); if (has) setOpen(o => ({ ...o, [node.id]: !o[node.id] })); }}
      >
        {has ? <span className={"chev" + (isOpen ? " open" : "")}>{icons.chev}</span> : <span style={{ width: 14 }}></span>}
        <span className="ic">{icons[ic]}</span>
        <span style={{ fontWeight: depth === 0 ? 600 : 500, flex: 1 }}>{node.name}</span>
        <span className="tree-actions">
          <button className="icon-btn" title="Rename" onClick={e => { e.stopPropagation(); onRename(node.id, node.name); }}>{icons.edit}</button>
          <button className="icon-btn" title="Add sub-location" onClick={e => { e.stopPropagation(); onAddChild(node.id); }}>{icons.plus}</button>
          <button className="icon-btn" title="Delete" style={{ color: "var(--danger)" }} onClick={e => { e.stopPropagation(); onDelete(node.id); }}>{icons.trash}</button>
        </span>
        <span className="count">{countAt(node.id)}</span>
      </div>
      {has && isOpen && (
        <div className="tree-children">
          {node.children.map(c => (
            <TreeNode key={c.id} node={c} depth={depth + 1} open={open} setOpen={setOpen}
              selected={selected} setSelected={setSelected} countAt={countAt}
              onRename={onRename} onDelete={onDelete} onAddChild={onAddChild} />
          ))}
        </div>
      )}
    </>
  );
}

const EMPTY_SPECS = { voltage: "", current: "", power: "", tolerance: "", frequency: "", tempRange: "" };

function AddPartDrawer({ open, onClose, onCreate, onUpdate, initialName, initial, deepseekKey, onSaveDeepseekKey }) {
  const editing = !!initial;
  const [form, setForm] = useState({
    name: "", cat: "resistor", qty: 0, min: 1, loc: "bin-r-1k", mfg: "", mpn: "", value: "", pkg: "", notes: "", price: 0, imageUrl: "", datasheetUrl: "", specs: { ...EMPTY_SPECS },
  });
