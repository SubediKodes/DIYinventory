  const [aiError, setAiError] = useState(null);
  const [keyDraft, setKeyDraft] = useState("");
  const [editingKey, setEditingKey] = useState(false);

  useEffect(() => {
    if (!open) return;
    setAiError(null); setEditingKey(false); setKeyDraft(deepseekKey || "");
    if (initial) {
      setForm({ name: initial.name || "", cat: initial.cat || "resistor", qty: initial.qty || 0, min: initial.min || 1, loc: initial.loc || "", mfg: initial.mfg || "", mpn: initial.mpn || "", value: initial.value || "", pkg: initial.pkg || "", notes: initial.notes || "", price: initial.price || 0, imageUrl: initial.imageUrl || "", datasheetUrl: initial.datasheetUrl || "", specs: { ...EMPTY_SPECS, ...(initial.specs || {}) } });
    } else {

    }
  }, [open]);

  const identify = async () => {
    if (!form.name.trim() || !deepseekKey) return;
    setIdentifying(true); setAiError(null);
    try {
      const catList = window.CATEGORIES.map(c => `${c.id} (${c.label})`).join(", ");
      const res = await fetch("https://api.deepseek.com/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${deepseekKey}` },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: [{ role: "user", content: `Identify this electronic component: "${form.name}". Return ONLY a JSON object (no markdown) with these exact fields:\n- name: canonical expanded name, never echo the input verbatim (e.g. "bc547" → "BC547 NPN General Purpose Transistor")\n- cat: must be exactly one of: ${catList}\n- value: component value (e.g. "1 kΩ", "100 nF", "5V 1A")\n- pkg: package (e.g. "TO-92", "0805", "DIP-8", "Axial")\n- mpn: real manufacturer part number\n- notes: one-line description` }],
          response_format: { type: "json_object" }
        })
      });
      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      const p = JSON.parse(data.choices[0].message.content);
      setForm(f => ({
        ...f,
        name: p.name || f.name,
        cat: p.cat || f.cat,
        value: p.value || f.value,
        pkg: p.pkg || f.pkg,
        mpn: p.mpn || f.mpn,
        notes: p.notes || f.notes,
      }));
    } catch (e) {
      setAiError(e.message);
    } finally {
      setIdentifying(false);
    }
  };

  if (!open) return null;
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const setSpec = (k, v) => setForm(f => ({ ...f, specs: { ...(f.specs || {}), [k]: v } }));
  const flatLocs = Object.values(LOC_INDEX);

      <aside className="drawer">

        <div className="drawer-body">
          {/* DeepSeek key setup */}
          {editingKey ? (
            <div className="field" style={{ marginBottom: 14 }}>
              <label>DeepSeek API Key</label>
              <div style={{ display: "flex", gap: 6 }}>
                <input className="input mono" type="text" placeholder="sk-…" value={keyDraft} onChange={e => setKeyDraft(e.target.value)} autoFocus
                  onKeyDown={e => { if (e.key === "Enter" && keyDraft.trim()) { onSaveDeepseekKey(keyDraft.trim()); setEditingKey(false); } }} />
                <button className="btn sm primary" disabled={!keyDraft.trim()} onClick={() => { onSaveDeepseekKey(keyDraft.trim()); setEditingKey(false); }}>Save</button>
                <button className="btn sm" onClick={() => setEditingKey(false)}>Cancel</button>
              </div>
              <span style={{ fontSize: 11, color: "var(--text-faint)" }}>Get a key at <a href="https://platform.deepseek.com/api_keys" target="_blank" style={{ color: "var(--accent)" }}>platform.deepseek.com</a></span>
            </div>
          ) : null}

          <div className="field">
            <label>Part name</label>
            <div style={{ display: "flex", gap: 6 }}>
              <input className="input" placeholder="e.g. 1kΩ ¼W" value={form.name} onChange={e => set("name", e.target.value)} autoFocus style={{ flex: 1 }} />

                className="icon-btn bordered"

function AddBomLineDrawer({ open, onClose, parts, existingIds, onAdd, onCreateNew }) {
  const [query, setQuery] = React.useState("");
  const [selected, setSelected] = React.useState(null);
  const [need, setNeed] = React.useState(1);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) { setQuery(""); setSelected(null); setNeed(1); setTimeout(() => inputRef.current && inputRef.current.focus(), 30); }
  }, [open]);

  const filtered = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    return parts
      .filter(p => !existingIds.has(p.id))
      .filter(p => !q || p.name.toLowerCase().includes(q) || p.mpn.toLowerCase().includes(q) || p.mfg.toLowerCase().includes(q))
      .slice(0, 40);
  }, [query, parts, existingIds]);

  if (!open) return null;

  const sel = selected ? parts.find(p => p.id === selected) : null;

  return (
    <>
      <div className="modal-backdrop" onClick={onClose}></div>
      <aside className="drawer">
        <div className="drawer-head">
          <h3>Add part to BOM</h3>
          <span className="muted" style={{ fontSize: 12 }}>Pick from inventory</span>
          <button className="icon-btn" style={{ marginLeft: "auto" }} onClick={onClose}>{icons.x}</button>
        </div>
        <div className="drawer-body" style={{ padding: 0, display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "12px 18px 8px", borderBottom: "1px solid var(--border)" }}>
            <div className="filter-bar" style={{ padding: 0, border: 0, background: "transparent" }}>
              <div className="search" style={{ flex: 1, maxWidth: "none" }}>
                <span style={{ color: "var(--text-faint)" }}>{icons.search}</span>
                <input ref={inputRef} placeholder="Search name, MPN, manufacturer…" value={query} onChange={e => setQuery(e.target.value)} />
                {query && <button className="icon-btn" style={{ width: 18, height: 18 }} onClick={() => setQuery("")}>{icons.x}</button>}
              </div>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: "auto" }}>
            {filtered.length === 0 && (
              <div style={{ padding: 32, textAlign: "center", color: "var(--text-faint)", fontSize: 13 }}>
                <div>{query ? "No matching parts in inventory" : "All inventory parts already in BOM"}</div>
                {query && (
                  <button
                    className="btn primary"
                    style={{ marginTop: 12 }}
                    onClick={() => { onClose(); onCreateNew(query); }}
                  >
                    <span className="icon">{icons.plus}</span> Create "{query}" and add to BOM
                  </button>
                )}
              </div>
            )}
            {filtered.map(p => {
              const cat = window.CATEGORIES.find(c => c.id === p.cat);
              const isSel = selected === p.id;
              return (
                <div
                  key={p.id}
                  className={"list-row" + (isSel ? " selected" : "")}
                  style={{ cursor: "pointer", background: isSel ? "var(--accent-soft)" : undefined }}
                  onClick={() => setSelected(isSel ? null : p.id)}
                >
                  <span className="cat-dot" style={{ background: cat?.color }}></span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 500, display: "flex", gap: 8, alignItems: "center" }}>
                      {p.name}
                      <span className="mono faint" style={{ fontSize: 11 }}>{p.mpn}</span>
                    </div>
                    <div className="meta">{p.mfg} · <span className="mono">{p.qty} in stock</span></div>
                  </div>
                  {isSel && <span style={{ color: "var(--accent)" }}>{icons.check}</span>}
                </div>
              );
            })}
          </div>

          {filtered.length > 0 && (
            <div style={{ padding: "8px 18px", borderTop: "1px dashed var(--border)" }}>
              <button className="btn ghost sm" style={{ width: "100%", color: "var(--text-muted)" }}
                onClick={() => { onClose(); onCreateNew(query); }}>
                <span className="icon">{icons.plus}</span>
                {query ? `Create "${query}" as new part` : "Create a new part in inventory"}
              </button>
            </div>
          )}

          {sel && (
            <div style={{ padding: "12px 18px", borderTop: "1px solid var(--border)", background: "var(--bg-sunk)", display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ flex: 1, fontSize: 13 }}>
                <div style={{ fontWeight: 500 }}>{sel.name}</div>
                <div className="muted" style={{ fontSize: 12 }}>{sel.qty} available</div>
              </div>
              <label style={{ fontSize: 12, color: "var(--text-muted)", display: "flex", alignItems: "center", gap: 8 }}>
                Qty needed
                <input
                  className="input mono"
                  type="number"
                  min="1"
                  value={need}
                  onChange={e => setNeed(Math.max(1, parseInt(e.target.value || "1", 10)))}
                  style={{ width: 72 }}
                />
              </label>
            </div>
          )}
        </div>
        <div className="drawer-foot">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" disabled={!sel} onClick={() => { onAdd(sel.id, need); onClose(); }}>
            <span className="icon">{icons.plus}</span> Add to BOM
          </button>
        </div>
      </aside>
    </>
  );
}

                {usedIn.map(pr => (

          ) : (
            <div style={{ color: "var(--text-muted)", fontSize: 13, marginBottom: 16 }}>This action cannot be undone.</div>

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>

  <script type="text/babel">
/* global React, ReactDOM, icons, Sidebar, Topbar, CommandPalette, Toasts, MobileNav, Dashboard, PartsList, PartDetail, Storage, ProjectsPage, ProjectDetail, AddPartDrawer, AddProjectDrawer, AddBomLineDrawer, ConfirmDeletePartModal, TweaksPanel, TweakSection, TweakRadio, TweakColor, TweakToggle, useTweaks, buildLocIndex, addChildToTree, renameInTree, removeFromTree */

const { useState, useEffect, useMemo, useCallback, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#ca8a04",
  "density": "comfortable",
  "monoNums": true
}/*EDITMODE-END*/;

// Accent presets: hex → (oklch chroma, hue) used to derive --accent variants.
const ACCENT_PRESETS = {
  "#ca8a04": { hue: 75,  chroma: 0.16 },   // amber (default)
  "#2563eb": { hue: 255, chroma: 0.18 },   // blue
  "#16a34a": { hue: 150, chroma: 0.14 },   // green
  "#9333ea": { hue: 300, chroma: 0.18 },   // violet
  "#dc2626": { hue: 25,  chroma: 0.19 },   // red
  "#475569": { hue: 250, chroma: 0.02 },   // neutral slate
};

function GistSyncModal({ open, onClose, onSave, currentToken, currentGistId, syncStatus }) {
  const [token, setToken] = React.useState(currentToken || "");
  const [gistId, setGistId] = React.useState(currentGistId || "");
  React.useEffect(() => { if (open) { setToken(currentToken || ""); setGistId(currentGistId || ""); } }, [open]);
  if (!open) return null;
  return (
    <>
      <div className="modal-backdrop" onClick={onClose}></div>
      <aside className="drawer">
        <div className="drawer-head">
          <span className="icon">{icons.gear}</span>
          <h3>GitHub Gist sync</h3>
          <button className="icon-btn" style={{ marginLeft: "auto" }} onClick={onClose}>{icons.x}</button>
        </div>
        <form onSubmit={e => { e.preventDefault(); onSave(token.trim(), gistId.trim()); }} style={{ display: "contents" }}>
          <div className="drawer-body">
            <p style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 16, lineHeight: 1.6 }}>
              Your parts are saved to a secret GitHub Gist and synced on every change. The token is stored only in this browser.
            </p>
            <div className="field">
              <label>Gist ID <span style={{ fontWeight: 400, textTransform: "none" }}>(leave blank to auto-create)</span></label>
              <input
                className="input mono"
                name="gist-id"
                autoComplete="username"
                placeholder="abc123def456… or leave blank"
                value={gistId}
                onChange={e => setGistId(e.target.value)}
              />
            </div>
            <div className="field">
              <label>GitHub Personal Access Token</label>
              <input
                className="input mono"
                type="text"
                name="github-token"
                autoComplete="current-password"
                placeholder="ghp_…"
                value={token}
                onChange={e => setToken(e.target.value)}
              />
              <span style={{ fontSize: 11, color: "var(--text-faint)" }}>
                Create one at github.com/settings/tokens — only the <b>gist</b> scope is needed.
              </span>
            </div>
            {syncStatus && (
              <div style={{ fontSize: 12, color: syncStatus.ok ? "var(--accent)" : "var(--danger)", marginTop: 4 }}>
                {syncStatus.msg}
              </div>
            )}
          </div>
          <div className="drawer-foot">
            {currentToken && (
              <button type="button" className="btn ghost" style={{ marginRight: "auto", color: "var(--danger)" }}
                onClick={() => onSave("", "")}>
                Disconnect
              </button>
            )}
            <button type="button" className="btn" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn primary">Save</button>
          </div>
        </form>
      </aside>
    </>
  );
}

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem("diy-theme") || "light");
  const [page, setPage] = useState(() => {
    try {
      const saved = localStorage.getItem("diy-page");
      return saved ? JSON.parse(saved) : "dashboard";
    } catch { return "dashboard"; }
  });
  const [parts, setParts] = useState(() => {
    try {
      const saved = localStorage.getItem("diy-parts");
      return saved ? JSON.parse(saved) : window.PARTS;
    } catch { return window.PARTS; }
  });
  const [projects, setProjects] = useState(() => {
    try {
      const saved = localStorage.getItem("diy-projects");
      return saved ? JSON.parse(saved) : window.PROJECTS;
    } catch { return window.PROJECTS; }
  });
  const [locations, setLocations] = useState(() => {
    try {
      const saved = localStorage.getItem("diy-locations");
      return saved ? JSON.parse(saved) : window.LOCATIONS;
    } catch { return window.LOCATIONS; }
  });
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [addOpen, setAddOpen] = useState(false);
  const [newProjectOpen, setNewProjectOpen] = useState(false);
  const [editProjectTarget, setEditProjectTarget] = useState(null);
  const [editPartTarget, setEditPartTarget] = useState(null);
  const [deletePartTarget, setDeletePartTarget] = useState(null);
  const [pendingBomProject, setPendingBomProject] = useState(null); // { projectId, name }
  const [addPartInitialName, setAddPartInitialName] = useState("");
  const [toasts, setToasts] = useState([]);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [gistOpen, setGistOpen] = useState(false);
  const [ghToken, setGhToken] = useState(() => localStorage.getItem("diy-gh-token") || "");
  const [gistId, setGistId] = useState(() => localStorage.getItem("diy-gist-id") || "");
  const [syncStatus, setSyncStatus] = useState(null);
  const [deepseekKey, setDeepseekKey] = useState(() => localStorage.getItem("diy-deepseek-key") || "");
  const syncTimer = useRef(null);
  const syncPausedUntil = useRef(0);

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("diy-theme", theme);
  }, [theme]);

  useEffect(() => {
    localStorage.setItem("diy-page", JSON.stringify(page));
  }, [page]);

  useEffect(() => {
    localStorage.setItem("diy-parts", JSON.stringify(parts));
  }, [parts]);

  useEffect(() => {
    localStorage.setItem("diy-projects", JSON.stringify(projects));
    window.PROJECTS = projects;
  }, [projects]);

  useEffect(() => {
    localStorage.setItem("diy-locations", JSON.stringify(locations));
  }, [locations]);

  const locIndex = useMemo(() => buildLocIndex(locations), [locations]);
  useEffect(() => { window.LOC_INDEX = locIndex; }, [locIndex]);

  // Gist sync: debounce writes, skip on first mount
  const isFirstRender = useRef(true);
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    if (!ghToken) return;
    clearTimeout(syncTimer.current);
    if (Date.now() < syncPausedUntil.current) return;
    syncTimer.current = setTimeout(async () => {
      setSyncStatus({ ok: true, msg: "Syncing…" });
      try {
        let id = gistId;
        const body = { description: "DIYinventory parts", public: false, files: { "parts.json": { content: JSON.stringify(parts, null, 2) }, "projects.json": { content: JSON.stringify(projects, null, 2) } } };
        if (!id) {
          const res = await fetch("https://api.github.com/gists", { method: "POST", headers: { Authorization: `Bearer ${ghToken}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
          if (!res.ok) throw new Error(`GitHub ${res.status}`);
          const data = await res.json();
          id = data.id;
          setGistId(id);
          localStorage.setItem("diy-gist-id", id);
        } else {
          const res = await fetch(`https://api.github.com/gists/${id}`, { method: "PATCH", headers: { Authorization: `Bearer ${ghToken}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
          if (!res.ok) throw new Error(`GitHub ${res.status}`);
        }
        setSyncStatus({ ok: true, msg: `Synced to Gist ${id.slice(0, 8)}… ✓`, at: new Date() });
      } catch (err) {
        setSyncStatus({ ok: false, msg: `Sync failed: ${err.message}` });
      }
    }, 1500);
  }, [parts, projects, ghToken, gistId]);

  // On load: pull latest from Gist if token + id are set
  useEffect(() => {
    if (!ghToken || !gistId) return;
    (async () => {
      try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { Authorization: `Bearer ${ghToken}` } });
        if (!res.ok) return;
        const data = await res.json();
        const content = data.files?.["parts.json"]?.content;
        if (content) setParts(JSON.parse(content));
        const projContent = data.files?.["projects.json"]?.content;
        if (projContent) setProjects(JSON.parse(projContent));
        if (content || projContent) setSyncStatus({ ok: true, msg: `Loaded from Gist ${gistId.slice(0, 8)}…` });
      } catch {}
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const saveGistSettings = useCallback(async (token, id) => {
    setGhToken(token);
    setGistId(id);
    localStorage.setItem("diy-gh-token", token);
    localStorage.setItem("diy-gist-id", id);
    setGistOpen(false);
    if (!token) {
      setSyncStatus(null);
      addToast({ kind: "warn", title: "Gist sync disconnected" });
      return;
    }
    if (id) {
      // Existing Gist: pause push and pull remote data first to avoid overwriting it
      syncPausedUntil.current = Date.now() + 8000;
      setSyncStatus({ ok: true, msg: "Loading from Gist…" });
      try {
        const res = await fetch(`https://api.github.com/gists/${id}`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) throw new Error(`GitHub ${res.status}`);
        const data = await res.json();
        const content = data.files?.["parts.json"]?.content;
        const projContent = data.files?.["projects.json"]?.content;
        if (content) setParts(JSON.parse(content));
        if (projContent) setProjects(JSON.parse(projContent));
        setSyncStatus({ ok: true, msg: `Loaded from Gist ${id.slice(0, 8)}… ✓` });
        addToast({ title: "Gist sync connected", desc: "Data loaded from Gist" });
      } catch (err) {
        syncPausedUntil.current = 0;
        setSyncStatus({ ok: false, msg: `Failed to load: ${err.message}` });
        addToast({ kind: "warn", title: "Could not load Gist", desc: err.message });
      }
    } else {
      addToast({ title: "Gist sync ready — will create Gist on next change" });
    }
  }, [addToast]);

  // Apply tweaks
  useEffect(() => {
    const preset = ACCENT_PRESETS[tweaks.accent] || ACCENT_PRESETS["#ca8a04"];
    const { hue, chroma } = preset;
    const isDark = theme === "dark";
    document.documentElement.style.setProperty("--accent", `oklch(${isDark ? 0.78 : 0.74} ${chroma} ${hue})`);
    document.documentElement.style.setProperty("--accent-soft", `oklch(${isDark ? 0.3 : 0.94} ${isDark ? chroma * 0.4 : chroma * 0.3} ${hue})`);
    document.documentElement.style.setProperty("--accent-strong", `oklch(${isDark ? 0.85 : 0.66} ${chroma + 0.01} ${hue})`);
    document.documentElement.style.setProperty("--accent-fg", `oklch(${isDark ? 0.16 : 0.22} ${chroma * 0.3} ${hue})`);
  }, [tweaks.accent, theme]);

  // Cmd+K
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setPaletteOpen(o => !o);
      }
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "n" && !e.shiftKey) {
        e.preventDefault();
        setAddOpen(true);
      }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);

  const addToast = useCallback((t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(arr => [...arr, { id, ...t }]);
    setTimeout(() => {
      setToasts(arr => arr.map(x => x.id === id ? { ...x, exit: true } : x));
      setTimeout(() => setToasts(arr => arr.filter(x => x.id !== id)), 200);
    }, 3200);
  }, []);

  const dismissToast = useCallback(id => {
    setToasts(arr => arr.map(x => x.id === id ? { ...x, exit: true } : x));
    setTimeout(() => setToasts(arr => arr.filter(x => x.id !== id)), 200);
  }, []);

  const updatePart = useCallback((id, patch) => {
    setParts(arr => arr.map(p => p.id === id ? { ...p, ...patch } : p));
  }, []);
  const deletePart = useCallback((id) => {
    setParts(arr => arr.filter(p => p.id !== id));
  }, []);
  const exportParts = useCallback(() => {
    const blob = new Blob([JSON.stringify(parts, null, 2)], { type: "application/json" });
    const a = Object.assign(document.createElement("a"), {
      href: URL.createObjectURL(blob),
      download: `diy-parts-${new Date().toISOString().slice(0, 10)}.json`,
    });
    a.click();
    URL.revokeObjectURL(a.href);
  }, [parts]);

  const importParts = useCallback(() => {
    const input = Object.assign(document.createElement("input"), { type: "file", accept: ".json,application/json" });
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) throw new Error("Expected an array");
          setParts(data);
          addToast({ title: "Imported", desc: `${data.length} parts loaded` });
        } catch (err) {
          addToast({ kind: "warn", title: "Import failed", desc: err.message });
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }, [addToast]);

  const createPart = useCallback((form) => {
    const id = "p" + Math.random().toString(36).slice(2, 6);
    setParts(arr => [{
      id,
      added: new Date().toISOString().slice(0, 10),
      datasheet: false,
      tol: "—",
      ...form,
    }, ...arr]);
    if (pendingBomProject) {
      setProjects(arr => arr.map(p => p.id === pendingBomProject.projectId
        ? { ...p, bom: [...p.bom, { partId: id, need: 1 }], updated: "just now" }
        : p));
      setPendingBomProject(null);
      addToast({ title: "Part created and added to BOM", desc: form.name });
    } else {
      addToast({ title: "Part created", desc: form.name });
    }
  }, [addToast, pendingBomProject]);

  const createProject = useCallback((form) => {
    const id = "proj-" + Math.random().toString(36).slice(2, 7);
    setProjects(arr => [{
      id,
      name: form.name.trim(),
      desc: form.desc.trim(),
      status: form.status,
      updated: "just now",
      bom: [],
    }, ...arr]);
    addToast({ title: "Project created", desc: form.name });
  }, [addToast]);

  const deleteProject = useCallback((id, name) => {
    setProjects(arr => arr.filter(p => p.id !== id));
    setPage("projects");
    addToast({ kind: "warn", title: "Project deleted", desc: name });
  }, [addToast]);

  const updateProject = useCallback((id, form) => {
    setProjects(arr => arr.map(p => p.id === id ? { ...p, name: form.name.trim(), desc: form.desc.trim(), status: form.status, updated: "just now" } : p));
    addToast({ title: "Project updated", desc: form.name });
  }, [addToast]);

  const addBomLine = useCallback((projectId, partId, need) => {
    setProjects(arr => arr.map(p => p.id === projectId
      ? { ...p, bom: [...p.bom, { partId, need }], updated: "just now" }
      : p));
  }, []);

  const removeBomLine = useCallback((projectId, partId) => {
    setProjects(arr => arr.map(p => p.id === projectId
      ? { ...p, bom: p.bom.filter(b => b.partId !== partId), updated: "just now" }
      : p));
  }, []);

  const addLocation = useCallback((parentId, name) => {
    const id = "loc-" + Math.random().toString(36).slice(2, 7);
    const node = { id, name, children: [] };
    setLocations(locs => parentId ? addChildToTree(locs, parentId, node) : [...locs, node]);
  }, []);

  const renameLocation = useCallback((id, name) => {
    setLocations(locs => renameInTree(locs, id, name));
  }, []);

  const deleteLocation = useCallback((id) => {
    setLocations(locs => removeFromTree(locs, id));
  }, []);

  // Counts for sidebar
  const partCounts = useMemo(() => {
    const byCat = {};
    parts.forEach(p => { byCat[p.cat] = (byCat[p.cat] || 0) + 1; });
    const emin = (p) => {
      const need = projects.reduce((a, proj) => {
        const b = proj.bom ? proj.bom.find(x => x.partId === p.id) : null;
        return a + (b ? b.need : 0);
      }, 0);
      return Math.max(p.min, need);
    };
    return {
      total: parts.length,
      low: parts.filter(p => p.qty < emin(p)).length,
      byCat,
    };
  }, [parts, projects]);

  // Crumbs
  const crumbs = useMemo(() => {
    if (page === "dashboard") return ["Dashboard"];
    if (page === "storage") return ["Storage"];
    if (page === "projects") return ["Projects"];
    if (typeof page === "object") {
      if (page.name === "parts") {
        const out = ["Parts"];
        if (page.cat) out.push(window.CATEGORIES.find(c => c.id === page.cat)?.label || "");
        if (page.filter === "low") out.push("Low stock");
        if (page.filter === "recent") out.push("Recently added");
        return out;
      }
      if (page.name === "part") {
        const p = parts.find(x => x.id === page.id);
        return ["Parts", p ? p.name : "Part"];
      }
      if (page.name === "project") {
        const p = projects.find(x => x.id === page.id);
        return ["Projects", p ? p.name : "Project"];
      }
    }
    return ["DIYinv"];
  }, [page, parts, projects]);

  let content;
  if (page === "dashboard") content = <Dashboard parts={parts} projects={projects} navigate={setPage} />;
  else if (page === "storage") content = <Storage parts={parts} navigate={setPage} locations={locations} locIndex={locIndex} addLocation={addLocation} renameLocation={renameLocation} deleteLocation={deleteLocation} />;
  else if (page === "projects") content = <ProjectsPage projects={projects} parts={parts} navigate={setPage} addToast={addToast} onNew={() => setNewProjectOpen(true)} deleteProject={deleteProject} />;
  else if (typeof page === "object" && page.name === "parts") {
    content = <PartsList
      parts={parts}
      navigate={setPage}
      updatePart={updatePart}
      deletePart={deletePart}
      openAdd={() => setAddOpen(true)}
      openEdit={(p) => setEditPartTarget(p)}
      openDelete={(p) => setDeletePartTarget(p)}
      initialCat={page.cat}
      initialFilter={page.filter}
      addToast={addToast}
    />;
  }
  else if (typeof page === "object" && page.name === "part") {
    const part = parts.find(p => p.id === page.id);
    if (!part) content = <div className="content-inner"><div className="muted">Part not found.</div></div>;
    else content = <PartDetail part={part} parts={parts} navigate={setPage} updatePart={updatePart} addToast={addToast} onEdit={() => setEditPartTarget(part)} onDelete={() => setDeletePartTarget(part)} />;
  }
  else if (typeof page === "object" && page.name === "project") {
    const proj = projects.find(p => p.id === page.id);
    content = <ProjectDetail project={proj} parts={parts} navigate={setPage} addToast={addToast} deleteProject={deleteProject} onEdit={() => setEditProjectTarget(proj)} onAddBomLine={addBomLine} onRemoveBomLine={removeBomLine} onCreateNewPartForBom={(projectId, name) => { setPendingBomProject({ projectId }); setAddPartInitialName(name); setAddOpen(true); }} />;
  }

  return (
    <div className="app" data-density={tweaks.density}>
      {mobileOpen && <div className="mobile-scrim" onClick={() => setMobileOpen(false)}></div>}
      <Sidebar
        page={typeof page === "object" ? page : page}
        setPage={setPage}
        partCounts={partCounts}
        projects={projects}
        theme={theme}
        setTheme={setTheme}
        mobileOpen={mobileOpen}
        setMobileOpen={setMobileOpen}
        onOpenGistSettings={() => setGistOpen(true)}
        ghToken={ghToken}
        syncStatus={syncStatus}
      />
      <main className="main">
        <Topbar
          crumbs={crumbs}
          onOpenPalette={() => setPaletteOpen(true)}
          onAddPart={() => setAddOpen(true)}
          setMobileOpen={setMobileOpen}
          exportParts={exportParts}
          importParts={importParts}
        />
        <div className="content">{content}</div>
      </main>

      <CommandPalette
        open={paletteOpen}
        onClose={() => setPaletteOpen(false)}
        parts={parts}
        projects={projects}
        navigate={setPage}
        theme={theme}
        setTheme={setTheme}
        addPart={() => setAddOpen(true)}
        addProject={() => setNewProjectOpen(true)}
      />

      <AddPartDrawer open={addOpen} onClose={() => { setAddOpen(false); setAddPartInitialName(""); setPendingBomProject(null); }} onCreate={createPart} initialName={addPartInitialName} deepseekKey={deepseekKey} onSaveDeepseekKey={(key) => { setDeepseekKey(key); localStorage.setItem("diy-deepseek-key", key); }} />
      <AddPartDrawer open={!!editPartTarget} onClose={() => setEditPartTarget(null)} initial={editPartTarget} onUpdate={(form) => { updatePart(editPartTarget.id, form); addToast({ title: "Part updated", desc: form.name }); }} deepseekKey={deepseekKey} onSaveDeepseekKey={(key) => { setDeepseekKey(key); localStorage.setItem("diy-deepseek-key", key); }} />
      <ConfirmDeletePartModal
        part={deletePartTarget}
        projects={projects}
        onClose={() => setDeletePartTarget(null)}
        onConfirm={() => {
          deletePart(deletePartTarget.id);
          if (typeof page === "object" && page.name === "part" && page.id === deletePartTarget.id) setPage({ name: "parts" });
          addToast({ kind: "warn", title: "Part deleted", desc: deletePartTarget.name });
          setDeletePartTarget(null);
        }}
      />
      <AddProjectDrawer open={newProjectOpen} onClose={() => setNewProjectOpen(false)} onCreate={createProject} />
      <AddProjectDrawer open={!!editProjectTarget} onClose={() => setEditProjectTarget(null)} initial={editProjectTarget} onUpdate={(form) => updateProject(editProjectTarget.id, form)} />

      <GistSyncModal
        open={gistOpen}
        onClose={() => setGistOpen(false)}
        onSave={saveGistSettings}
        currentToken={ghToken}
        currentGistId={gistId}
        syncStatus={syncStatus}
      />

      <MobileNav page={page} setPage={setPage} />
      <Toasts toasts={toasts} dismiss={dismissToast} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakRadio
            label="Mode"
            value={theme}
            onChange={v => setTheme(v)}
            options={[{ value: "light", label: "Light" }, { value: "dark", label: "Dark" }]}
          />
          <TweakColor
            label="Accent"
            value={tweaks.accent}
            onChange={v => setTweak("accent", v)}
            options={Object.keys(ACCENT_PRESETS)}
          />
        </TweakSection>
        <TweakSection label="Table">
          <TweakRadio
            label="Density"
            value={tweaks.density}
            onChange={v => setTweak("density", v)}
            options={[{ value: "compact", label: "Compact" }, { value: "comfortable", label: "Comfy" }]}
          />
          <TweakToggle
            label="Mono numbers"
            value={tweaks.monoNums}
            onChange={v => setTweak("monoNums", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

// Density tweak — apply via CSS
const densityStyle = document.createElement("style");
densityStyle.textContent = `
  [data-density="compact"] .tbl tbody td { padding: 4px 12px; height: 30px; }
  [data-density="compact"] .list-row { padding: 6px 14px; }
  [data-density="compact"] .tbl thead th { padding: 6px 12px; }
`;
document.head.appendChild(densityStyle);

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>

</body>
</html>
